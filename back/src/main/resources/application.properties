spring.application.name=back


server.port=8080
server.servlet.context-path=/api
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

spring.messages.encoding=UTF-8


spring.datasource.url=jdbc:mysql://localhost:3306/warehouse_management?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=wms_user
spring.datasource.password=wms_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver



mybatis-plus.mapper-locations=classpath:mapper/**/*.xml

mybatis-plus.type-aliases-package=org.example.back.entity

mybatis-plus.configuration.map-underscore-to-camel-case=true

mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl



mybatis-plus.global-config.db-config.logic-delete-field=isDeleted

mybatis-plus.global-config.db-config.logic-delete-value=1

mybatis-plus.global-config.db-config.logic-not-delete-value=0

mybatis-plus.global-config.db-config.id-type=auto


sa-token.token-name=Authorization
sa-token.token-prefix=Bearer

sa-token.timeout=86400

sa-token.active-timeout=1800

sa-token.is-concurrent=true

sa-token.is-share=true

sa-token.token-style=uuid

sa-token.is-log=false

knife4j.enable=true
knife4j.setting.language=zh_cn

# 文件上传配置
app.upload.base-path=../uploads
app.upload.allowed-types=image/jpeg,image/png,image/gif,image/webp
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
